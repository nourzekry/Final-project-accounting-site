<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Income Statement - Accounting System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>


<nav class="navbar">
  <div class="logo">⚖️ <span>Accounting</span> System</div>
  <ul class="nav-links">
    <li><a href="index.html">📝 Entries</a></li>
    <li><a href="Trial-balance.html">📊 Trial Balance</a></li>
    <li><a href="income-statement.html" class="active">📈 Income Statement</a></li>
    <li><a href="balance-sheet.html">🏦 Balance Sheet</a></li>
    <li><a href="dashboard.html">🖥️ Dashboard</a></li>
    <li><a href="accountsmanager.html" >🗂️ Accounts</a></li>
  </ul>
</nav>


<div class="page">
  <div class="page-header">
    <h1>📈 Income Statement</h1>
    <p>Revenue — Expenses = Net Profit or Loss</p>
  </div>

  <div class="card" style="margin-bottom:1.5rem">
    <div class="form-grid">
      <div class="form-group">
        <label>📅 From Date</label>
        <input type="date" id="dateFrom" onchange="render()" />
      </div>
      <div class="form-group">
        <label>📅 To Date</label>
        <input type="date" id="dateTo" onchange="render()" />
      </div>
      <div class="form-group" style="justify-content:flex-end;flex-direction:row;align-items:flex-end;gap:0.5rem">
        <button class="btn btn-ghost" onclick="resetFilters()">↺ Reset</button>
        <button class="btn btn-primary" onclick="window.print()">🖨️ Print</button>
      </div>
    </div>
  </div>

  <div id="netBanner" style="margin-bottom:1.5rem"></div>

  <div class="stats-grid" id="statsRow" style="margin-bottom:1.5rem"></div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem">
    <div class="card">
      <div class="card-title" style="color:var(--green)">📥 Revenues</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Code</th><th>Account</th><th>Amount (EGP)</th></tr></thead>
          <tbody id="revBody"></tbody>
          <tfoot id="revFoot"></tfoot>
        </table>
      </div>
      <div id="revEmpty"></div>
    </div>

    <div class="card">
      <div class="card-title" style="color:var(--red)">📤 Expenses</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Code</th><th>Account</th><th>Amount (EGP)</th></tr></thead>
          <tbody id="expBody"></tbody>
          <tfoot id="expFoot"></tfoot>
        </table>
      </div>
      <div id="expEmpty"></div>
    </div>
  </div>

  <div class="card" style="margin-top:1.5rem" id="netCard"></div>
</div>

<script src="accounts.js"></script>
<script>
  window.onload = () => {
    const now = new Date();
    const y = now.getFullYear(), m = now.getMonth();
    document.getElementById('dateFrom').value = new Date(y, m, 1).toISOString().split('T')[0];
    document.getElementById('dateTo').value = new Date(y, m + 1, 0).toISOString().split('T')[0];
    render();
  };

  function resetFilters() {
    document.getElementById('dateFrom').value = '';
    document.getElementById('dateTo').value = '';
    render();
  }

  function render() {
    let entries = loadEntries();
    const from = document.getElementById('dateFrom').value;
    const to = document.getElementById('dateTo').value;
    if (from) entries = entries.filter(e => e.date >= from);
    if (to) entries = entries.filter(e => e.date <= to);

    const revMap = {}, expMap = {};

    entries.forEach(entry => {
      entry.lines.forEach(line => {
        const acc = getAccount(line.code);
        
        if (acc?.type === 'revenue') {
          if (!revMap[line.code]) {
            revMap[line.code] = {
              code: line.code,
              name: acc.name,
              amount: 0
            };
          }
          revMap[line.code].amount += (line.credit - line.debit);
        }
    
        if (acc?.type === 'expense') {
          if (!expMap[line.code]) {
            expMap[line.code] = {
              code: line.code,
              name: acc.name,
              amount: 0
            };
          }
          expMap[line.code].amount += (line.debit - line.credit);
        }
      });
    });

    const revRows = Object.values(revMap).sort((a, b) => a.code.localeCompare(b.code));
    const expRows = Object.values(expMap).sort((a, b) => a.code.localeCompare(b.code));

    const totalRev = revRows.reduce((s, r) => s + r.amount, 0);
    const totalExp = expRows.reduce((s, r) => s + r.amount, 0);
    const netProfit = totalRev - totalExp;
    const isProfit = netProfit >= 0;

    document.getElementById('statsRow').innerHTML = `
      <div class="stat-card green">
        <div class="stat-label">Total Revenue</div>
        <div class="stat-value green">${fmt(totalRev)}</div>
      </div>
      <div class="stat-card red">
        <div class="stat-label">Total Expenses</div>
        <div class="stat-value red">${fmt(totalExp)}</div>
      </div>
      <div class="stat-card ${isProfit ? 'green' : 'red'}">
        <div class="stat-label">Profit Margin</div>
        <div class="stat-value ${isProfit ? 'green' : 'red'}">${totalRev > 0 ? ((netProfit / totalRev) * 100).toFixed(1) + '%' : '0%'}</div>
      </div>
    `;

    document.getElementById('netBanner').innerHTML = `
      <div style="background:var(--surface); border:2px solid ${isProfit ? 'var(--green)' : 'var(--red)'}; border-radius:var(--radius); padding:1.5rem; display:flex; justify-content:space-between; align-items:center">
        <div>
          <div style="font-size:0.8rem; color:var(--text2); text-transform:uppercase;">Net ${isProfit ? 'Profit' : 'Loss'}</div>
          <div style="font-size:2rem; font-weight:800; color:${isProfit ? 'var(--green)' : 'var(--red)'}">
            ${isProfit ? '' : '-'}${fmt(Math.abs(netProfit))} EGP
          </div>
        </div>
        <div style="font-size:3rem">${isProfit ? '📈' : '📉'}</div>
      </div>
    `;

    document.getElementById('revBody').innerHTML = revRows.map(r => `
      <tr><td><code>${r.code}</code></td><td>${r.name}</td><td style="color:var(--green);font-weight:600">${fmt(r.amount)}</td></tr>
    `).join('');
    document.getElementById('revFoot').innerHTML = `<tr class="tfoot-row"><td colspan="2">Total</td><td>${fmt(totalRev)}</td></tr>`;

    document.getElementById('expBody').innerHTML = expRows.map(r => `
      <tr><td><code>${r.code}</code></td><td>${r.name}</td><td style="color:var(--red);font-weight:600">${fmt(r.amount)}</td></tr>
    `).join('');
    document.getElementById('expFoot').innerHTML = `<tr class="tfoot-row"><td colspan="2">Total</td><td>${fmt(totalExp)}</td></tr>`;

    document.getElementById('netCard').innerHTML = `
      <div class="card-title">🧮 Summary</div>
      <table>
        <tr><td>Total Revenues</td><td style="color:var(--green); font-weight:700;">${fmt(totalRev)}</td></tr>
        <tr><td>Less: Total Expenses</td><td style="color:var(--red); font-weight:700;">(${fmt(totalExp)})</td></tr>
        <tr style="border-top:2px solid var(--border)"><td style="font-weight:700">Net ${isProfit ? 'Profit' : 'Loss'}</td><td style="font-weight:800; color:${isProfit ? 'var(--green)' : 'var(--red)'}">${fmt(Math.abs(netProfit))}</td></tr>
      </table>
    `;
  }

  function fmt(num) {
    return num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function loadEntries() {
    return JSON.parse(localStorage.getItem('journal_entries') || '[]');
  }
</script>
</body>
</html>
